<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sign  In </title>
    <!-- <link rel="stylesheet" href="login.css"> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <h2>Log In</h2>

    <!-- Log In Form -->
    <form id="loginForm" method="post" action="{{ url_for('login') }}">
        <input type="username" id="loginEmail" name="username" placeholder="username" required>
        <input type="password" id="loginPassword" name="password" placeholder="Password" required>
        <button type="submit">Log In</button>
    </form>

    <!-- Link to Sign Up page -->
    <a class="toggle-link" href="/signup">Don't have an account? Sign Up</a>
</div>

</body>
</html>
